<!DOCTYPE html>
<html> <!-- Bug 4: Falta el atributo lang en <html> -->
<head>
    <meta charset="UTF-8">
    <title>Demo 3: Mixed Errors</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .bad-contrast {
            color: #AAAAAA; /* Bug 1: Contraste insuficiente (#AAAAAA sobre blanco es aprox 2.32:1) */
            background-color: #FFFFFF;
        }
    </style>
</head>
<body>
    <h1 class="bad-contrast">Título Principal con Mal Contraste</h1>
    
    <p>A continuación se muestran errores mezclados:</p>

    <!-- Bug 2: Botón con solo ícono SVG, sin aria-label -->
    <button>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>

    <br><br>

    <!-- Bug 3: Checkbox sin label explícito o implícito -->
    <input type="checkbox" id="newsletter_optin"> Suscribirse al newsletter mensual
    
</body>
</html>
