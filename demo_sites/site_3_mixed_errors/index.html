<!DOCTYPE html>
<html> <!-- Bug 4: Missing lang attribute on <html> -->
<head>
    <meta charset="UTF-8">
    <title>Demo 3: Mixed Errors</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .bad-contrast {
            color: #AAAAAA; /* Bug 1: Insufficient contrast (#AAAAAA on white is approx 2.32:1) */
            background-color: #FFFFFF;
        }
    </style>
</head>
<body>
    <h1 class="bad-contrast">Main Title with Bad Contrast</h1>
    
    <p>Below are mixed accessibility errors:</p>

    <!-- Bug 2: Button with SVG icon only, missing aria-label -->
    <button>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>

    <br><br>

    <!-- Bug 3: Checkbox without explicit or implicit label -->
    <input type="checkbox" id="newsletter_optin"> Subscribe to monthly newsletter
    
</body>
</html>
