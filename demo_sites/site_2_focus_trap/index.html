<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Demo 2: Focus Trap & Order</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .modal {
            display: block;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid black;
            padding: 20px;
            z-index: 1000;
        }

        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
    </style>
</head>

<body>
    <!-- Bug 2: Illogical focus order.
         The modal is at the start of the DOM with tabindex=0, 
         so it receives focus before the user sees the main content. -->

    <div class="backdrop"></div>
    <div class="modal" role="dialog" tabindex="0">
        <h2>Subscription Modal</h2>
        <input type="text" id="email" placeholder="Email address">
        <button id="subscribe">Subscribe</button>
        <!-- Bug 1: Modal without Escape key handling or a keyboard-reachable close button -->
    </div>

    <main>
        <h1>Main Content</h1>
        <p>This content is after the modal in the DOM, creating an illogical jump.</p>
        <button id="btn-1">Main Button</button>
        <a href="#">Main Link</a>
    </main>

    <script>
        // Explicitly simulate the focus trap by intercepting the Tab key
        const modal = document.querySelector('.modal');
        const focusableElements = modal.querySelectorAll('input, button, [tabindex="0"]');
        const firstElement = focusableElements[0];
        const lastElement = focusableElements[focusableElements.length - 1];

        modal.addEventListener('keydown', function (e) {
            if (e.key === 'Tab') {
                if (e.shiftKey) { // Shift + Tab
                    if (document.activeElement === firstElement) {
                        e.preventDefault();
                        lastElement.focus();
                    }
                } else { // Tab
                    if (document.activeElement === lastElement) {
                        e.preventDefault();
                        firstElement.focus();
                    }
                }
            }
            // There is intentionally NO handling for the "Escape" key
        });
    </script>
</body>

</html>
