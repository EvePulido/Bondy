<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Demo 2: Focus Trap & Order</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .modal {
            display: block;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; border: 2px solid black; padding: 20px;
            z-index: 1000;
        }
        .backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999;
        }
    </style>
</head>
<body>
    <!-- Bug 2: Orden de foco ilógico.
         El modal está al inicio del DOM con tabindex=0, 
         por lo que recibe el foco antes de que el usuario vea el contenido principal. -->
    
    <div class="backdrop"></div>
    <div class="modal" role="dialog" tabindex="0">
        <h2>Modal de Suscripción</h2>
        <input type="text" id="email" placeholder="Correo electrónico">
        <button id="subscribe">Suscribirse</button>
        <!-- Bug 1: Modal sin manejo de Escape ni botón de cierre alcanzable por teclado -->
    </div>

    <main>
        <h1>Contenido Principal</h1>
        <p>Este contenido está después del modal en el DOM, creando un salto ilógico.</p>
        <button id="btn-1">Botón Principal</button>
        <a href="#">Enlace Principal</a>
    </main>

    <script>
        // Simulamos la trampa de foco explícitamente interceptando la tecla Tab
        const modal = document.querySelector('.modal');
        const focusableElements = modal.querySelectorAll('input, button, [tabindex="0"]');
        const firstElement = focusableElements[0];
        const lastElement = focusableElements[focusableElements.length - 1];

        modal.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                if (e.shiftKey) { // Shift + Tab
                    if (document.activeElement === firstElement) {
                        e.preventDefault();
                        lastElement.focus();
                    }
                } else { // Tab
                    if (document.activeElement === lastElement) {
                        e.preventDefault();
                        firstElement.focus();
                    }
                }
            }
            // NO hay manejo de tecla "Escape" intencionalmente
        });
    </script>
</body>
</html>
